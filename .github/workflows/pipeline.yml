name: Docker

on:
  push:
    branches: [ "main" ]
    tags: [ "v1.*.*" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [ self-hosted, linux ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u guilhermelinosp --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:latest

  release:
    runs-on: [ self-hosted, linux ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        id: version
        run: |
          VERSION=v1.0.${{ github.run_number }}
          MAJOR=v1

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT

      - name: Configure git auth for push
        env:
          REPO_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          # configure git user
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # set remote to use PAT for authentication so push succeeds
          git remote set-url origin "https://x-access-token:${REPO_PAT}@github.com/${{ github.repository }}.git"

      - name: Create version tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Update major tag
        run: |
          git tag -f ${{ steps.version.outputs.major }}
          git push origin ${{ steps.version.outputs.major }} --force
