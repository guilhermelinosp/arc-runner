name: pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  login:
    uses: guilhermelinosp/ci-templates/.github/workflows/login.yaml@latest

  buildx:
    needs: login
    uses: guilhermelinosp/ci-templates/.github/workflows/buildx.yaml@latest

  release:
    needs: build
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yaml@latest
