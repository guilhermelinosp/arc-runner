name: pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  buildx:
    uses: guilhermelinosp/ci-templates/.github/workflows/buildx.yaml@latest

  release:
    needs: buildx
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yaml@latest

  push:
    needs: [ release, buildx ]
    uses: guilhermelinosp/ci-templates/.github/workflows/push.yaml@latest
    with:
      image: ${{ needs.buildx.outputs.image }}
      version: ${{ needs.release.outputs.version }}
